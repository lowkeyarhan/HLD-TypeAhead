spring:
  application:
    name: TypeAhead
  profiles:
    active: local

# Springdoc API documentation configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Tunable constants for suggestions, caching, ranking, and batching
typeahead:
  cache:
    node-count: 3
    virtual-nodes: 150
    ttl-seconds: 60
  batch:
    flush-interval-ms: 5000
    size-threshold: 500
  ranking:
    decay-half-life-minutes: 30.0
    strategy: recency-aware

---
# Local profile using local PostgreSQL
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    driver-class-name: org.postgresql.Driver
    username: myuser
    password: secret
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

---
# Default (production/Docker) profile using environmental configurations
spring:
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mydatabase}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:myuser}
    password: ${DB_PASSWORD:secret}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
